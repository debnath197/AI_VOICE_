<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Live Voice Answer App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 900px;
            margin: 40px auto;
            padding: 20px;
            text-align: center;
        }

        button {
            padding: 12px 20px;
            margin-top: 10px;
            cursor: pointer;
            font-size: 16px;
        }

        textarea {
            width: 100%;
            min-height: 120px;
            margin-top: 20px;
            padding: 10px;
            font-size: 16px;
        }

        #answer {
            margin-top: 20px;
            padding: 15px;
            border: 1px solid #ccc;
            min-height: 60px;
            background: #f8f8f8;
            font-size: 18px;
            text-align: left;
        }
    </style>
</head>
<body>

    <h1>🎤 Live Voice Answer App</h1>
    <button id="startBtn">Start Speaking</button>

    <h3>Your Speech:</h3>
    <textarea id="transcript" placeholder="Your speech will appear here..."></textarea>

    <h3>Answer:</h3>
    <div id="answer">Waiting for your voice...</div>

    <script>
        const startBtn = document.getElementById("startBtn");
        const transcriptBox = document.getElementById("transcript");
        const answerBox = document.getElementById("answer");

        const API_BASE = window.location.origin;
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

        if (!SpeechRecognition) {
            alert("Speech Recognition is not supported in this browser. Please use Google Chrome.");
        } else {
            const recognition = new SpeechRecognition();
            recognition.lang = "en-US";
            recognition.interimResults = false;
            recognition.maxAlternatives = 1;
            recognition.continuous = false;

            startBtn.addEventListener("click", () => {
                transcriptBox.value = "";
                answerBox.innerText = "🎧 Listening... Please speak now.";
                recognition.start();
            });

            recognition.onresult = async (event) => {
                const transcript = event.results[0][0].transcript;
                transcriptBox.value = transcript;
                answerBox.innerText = "⏳ Thinking...";

                try {
                    const response = await fetch(`${API_BASE}/ask`, {
                        method: "POST",
                        headers: {
                            "Content-Type": "application/json"
                        },
                        body: JSON.stringify({ question: transcript })
                    });

                    const data = await response.json();
                    answerBox.innerText = data.answer;

                    const speech = new SpeechSynthesisUtterance(data.answer);
                    speech.lang = "en-US";
                    window.speechSynthesis.speak(speech);

                } catch (error) {
                    console.error("Fetch Error:", error);
                    answerBox.innerText = "❌ Failed to get answer from backend.";
                }
            };

            recognition.onerror = (event) => {
                if (event.error === "no-speech") {
                    answerBox.innerText = "⚠️ I could not hear anything. Please click again and speak clearly.";
                } else if (event.error === "not-allowed") {
                    answerBox.innerText = "⚠️ Microphone permission denied. Please allow microphone access.";
                } else {
                    answerBox.innerText = "❌ Speech Recognition Error: " + event.error;
                }
            };
        }
    </script>

</body>
</html>
